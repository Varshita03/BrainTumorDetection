{% extends 'base.html' %}
{% block title %}Signup | BrainAI{% endblock %}
{% block body %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <h3 class="text-center text-info mb-4">Create Your Account</h3>
      <form method="POST" action="/signup">
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required />
        </div>
        <div class="mb-3">
          <label for="confirm_password" class="form-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-info w-100">Sign Up</button>
      </form>
      <div class="text-center mt-3">
        Already have an account? <a href="/login" class="text-warning">Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
